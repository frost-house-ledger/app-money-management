name: Dependabot Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to merge (leave empty for PR events)'
        required: false
        default: ''
        type: string

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Enable auto-merge for patch/minor updates
        uses: actions/github-script@v7
        with:
          script: |
            // Helper function to process and merge a single PR
            async function processPR(prNumber) {
              try {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });

                const title = pr.data.title;
                core.info(`Processing PR #${prNumber}: ${title}`);

                // Extract version numbers from PR title (e.g., "bump xyz from 1.2.3 to 2.0.0")
                const versionMatch = title.match(/from\s+(\d+)\.(\d+)\.(\d+)\s+to\s+(\d+)\.(\d+)\.(\d+)/);
                
                if (!versionMatch) {
                  core.info(`PR #${prNumber}: Could not parse version numbers — skipping.`);
                  return;
                }

                const [, oldMajor, oldMinor, oldPatch, newMajor, newMinor, newPatch] = versionMatch.map(Number);

                // Only auto-merge patch and minor version updates, skip major version bumps
                const isMajorUpdate = newMajor > oldMajor;
                
                if (isMajorUpdate) {
                  core.info(`PR #${prNumber}: Major version update detected — skipping.`);
                  return;
                }

                // Merge the PR
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  merge_method: "squash"
                });

                core.info(`PR #${prNumber}: Auto-merged (patch/minor update).`);

                // Delete the branch after successful merge
                const headRef = pr.data.head.ref;
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${headRef}`
                  });
                  core.info(`PR #${prNumber}: Branch '${headRef}' deleted successfully.`);
                } catch (error) {
                  core.warning(`PR #${prNumber}: Failed to delete branch '${headRef}': ${error.message}`);
                }
              } catch (error) {
                core.warning(`Failed to process PR #${prNumber}: ${error.message}`);
              }
            }

            // Determine which PRs to process
            let prNumbers = [];
            
            if (context.eventName === 'workflow_dispatch') {
              const inputPr = context.payload.inputs?.pr_number;
              if (inputPr && inputPr.trim() !== '') {
                // Manual trigger with specific PR number
                const prNum = parseInt(inputPr, 10);
                if (isNaN(prNum)) {
                  core.setFailed('Invalid PR number: must be a number');
                  return;
                }
                prNumbers = [prNum];
              } else {
                // Manual trigger without PR number: search for all Dependabot PRs
                core.info('No PR number specified — searching for Dependabot PRs...');
                
                // First try to find PRs with "chore" label (set by dependabot.yml)
                let searchResult = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} label:chore is:pr is:open author:dependabot`,
                  per_page: 100
                });
                
                if (searchResult.data.items.length === 0) {
                  // Fallback: search for "dependencies" label
                  core.info('No "chore" labeled PRs found — trying "dependencies" label...');
                  searchResult = await github.rest.search.issuesAndPullRequests({
                    q: `repo:${context.repo.owner}/${context.repo.repo} label:dependencies is:pr is:open author:dependabot`,
                    per_page: 100
                  });
                }
                
                if (searchResult.data.items.length === 0) {
                  // Final fallback: search by author only
                  core.info('No labeled PRs found — searching by Dependabot author...');
                  searchResult = await github.rest.search.issuesAndPullRequests({
                    q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:open author:dependabot`,
                    per_page: 100
                  });
                }
                
                prNumbers = searchResult.data.items.map(item => item.number);
                core.info(`Found ${prNumbers.length} open Dependabot PRs.`);
            } else {
              // Pull request event: process the current PR
              const prNum = context.payload.pull_request?.number;
              if (!prNum) {
                core.setFailed('PR number not found in event payload');
                return;
              }
              prNumbers = [prNum];
            }

            // Process all PRs
            if (prNumbers.length === 0) {
              core.info('No PRs to process.');
              return;
            }

            for (const prNumber of prNumbers) {
              await processPR(prNumber);
            }

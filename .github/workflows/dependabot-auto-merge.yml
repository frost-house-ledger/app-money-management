name: Dependabot Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to merge (for manual trigger)'
        required: false
        type: number

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Enable auto-merge for patch/minor updates
        uses: actions/github-script@v7
        with:
          script: |
            // Determine PR number from trigger type
            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(github.event.inputs.pr_number, 10);
              if (!prNumber || isNaN(prNumber)) {
                core.setFailed('PR number is required for manual workflow_dispatch');
                return;
              }
            } else {
              prNumber = context.payload.pull_request.number;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const title = pr.data.title;

            // Extract version numbers from PR title (e.g., "bump xyz from 1.2.3 to 2.0.0")
            const versionMatch = title.match(/from\s+(\d+)\.(\d+)\.(\d+)\s+to\s+(\d+)\.(\d+)\.(\d+)/);
            
            if (!versionMatch) {
              core.info("Could not parse version numbers — skipping auto-merge.");
              return;
            }

            const [, oldMajor, oldMinor, oldPatch, newMajor, newMinor, newPatch] = versionMatch.map(Number);

            // Only auto-merge patch and minor version updates, skip major version bumps
            const isMajorUpdate = newMajor > oldMajor;
            
            if (isMajorUpdate) {
              core.info("Major version update detected — skipping auto-merge.");
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: "squash"
            });

            core.info("Dependabot PR auto-merged (patch/minor update).");
